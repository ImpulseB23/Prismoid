name: Stale

on:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 14 days unless there is new activity."
          stale-pr-message: "This PR has been inactive for 30 days. It will be closed in 7 days unless there is new activity."
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,security"
